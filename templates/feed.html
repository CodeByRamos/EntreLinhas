<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8" />
    <title>Entre Linhas — Desabafos Anônimos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      };
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen text-gray-900 dark:text-gray-100">

  <header class="p-6 text-center bg-white dark:bg-gray-800 shadow-md">
    <h1 class="text-3xl font-bold">📝 Entre Linhas</h1>
    <p class="subtitulo text-gray-700 dark:text-gray-300 mt-2">É seu espaço, diga o que sentir.</p>
  </header>

  <main class="max-w-xl mx-auto p-6">

    <!-- Formulário de envio -->
    <section
      id="formulario-de-envio"
      class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md mb-8"
    >
      <form method="POST" action="/enviar" class="flex flex-col gap-4">
        <label for="conteudo" class="font-semibold">Seu desabafo:</label>
        <textarea
          id="conteudo"
          name="conteudo"
          required
          placeholder="Escreva o que quiser dizer..."
          rows="4"
          class="w-full p-3 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        ></textarea>

        <label for="categoria" class="font-semibold">Categoria:</label>
        <select
          id="categoria"
          name="categoria"
          required
          class="w-full p-3 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-[url('data:image/svg+xml;utf8,<svg fill=\'%23999\' height=\'20\' viewBox=\'0 0 20 20\' width=\'20\' xmlns=\'http://www.w3.org/2000/svg\'><path d=\'M7 10l5 5 5-5z\'/></svg>')] bg-no-repeat bg-right-3"
        >
          <option value="" disabled selected>Selecione uma categoria</option>
          <option value="estudo">Estudo</option>
          <option value="família">Família</option>
          <option value="trabalho">Trabalho</option>
          <option value="amizade">Amizade</option>
          <option value="outros">Outros</option>
        </select>

        <button
          type="submit"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-md transition-colors duration-200"
        >
          Desabafar
        </button>
      </form>
    </section>

    <!-- Lista de desabafos -->
    <section id="lista-de-desabafos" class="space-y-4">
      {% for texto in desabafos %}
        <div
          class="desabafo bg-white dark:bg-gray-800 p-4 rounded-md shadow-sm break-words"
        >
          {{ texto }}
        </div>
      {% else %}
        <p class="text-center text-gray-500 dark:text-gray-400">
          Nenhum desabafo ainda.
        </p>
      {% endfor %}
    </section>
  </main>
</body>
</html>
